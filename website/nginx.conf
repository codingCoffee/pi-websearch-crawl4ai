server {
    listen       80 default_server;
    listen  [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/plain text/css text/xml application/xml application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # long cache for static assets, no-cache for HTML (so updates ship instantly)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /robots.txt   { add_header Cache-Control "public, max-age=3600" always; }
    location = /sitemap.xml  { add_header Cache-Control "public, max-age=3600" always; }

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # silence access log for the healthcheck probe
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
